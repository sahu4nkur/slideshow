<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Circle.Work</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --yellow: #FFCD33;
    --black:  #000000;
    --white:  #ffffff;
    --dur:    3s;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--black);
    font-family: 'DM Sans', sans-serif;
  }

  /* ── Slideshow container ── */
  .slideshow {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Each slide ── */
  .slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 1.2s cubic-bezier(0.77, 0, 0.175, 1);
    z-index: 0;
  }
  .slide.active { opacity: 1; z-index: 1; }

  /* ── Image fills slide, object-fit covers all screen sizes ── */
  .slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
    /* subtle Ken Burns zoom */
    animation: kenburns 8s ease-in-out infinite alternate;
  }
  /* Stagger Ken Burns per slide so they don't all zoom same direction */
  .slide:nth-child(2) img { animation-direction: alternate-reverse; }
  .slide:nth-child(3) img { animation-delay: -2s; }
  .slide:nth-child(4) img { animation-direction: alternate-reverse; animation-delay: -1s; }
  .slide:nth-child(5) img { animation-delay: -3s; }

  @keyframes kenburns {
    from { transform: scale(1.00); }
    to   { transform: scale(1.06); }
  }

  /* ── Dark vignette overlay over every slide ── */
  .slide::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(to top,  rgba(0,0,0,0.55) 0%,  transparent 45%),
      linear-gradient(to bottom, rgba(0,0,0,0.25) 0%, transparent 30%);
    z-index: 2;
  }

  /* ── Bottom overlay bar ── */
  .overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 10;
    padding: clamp(14px, 3vw, 24px) clamp(18px, 4vw, 36px);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
  }

  .brand {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(0.95rem, 2.5vw, 1.3rem);
    letter-spacing: 0.2em;
    color: var(--yellow);
    user-select: none;
    line-height: 1;
  }

  /* ── Progress dots ── */
  .dots {
    display: flex;
    gap: clamp(5px, 1vw, 8px);
    align-items: center;
  }

  .dot {
    height: 3px;
    width: clamp(20px, 4vw, 32px);
    background: rgba(255,255,255,0.25);
    border-radius: 2px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }

  .dot::after {
    content: '';
    position: absolute;
    left: 0; top: 0;
    height: 100%;
    width: 0%;
    background: var(--yellow);
    border-radius: 2px;
  }

  .dot.active::after {
    animation: fillDot var(--dur) linear forwards;
  }

  @keyframes fillDot {
    from { width: 0%; }
    to   { width: 100%; }
  }

  /* ── Loader ── */
  .loader {
    position: absolute;
    inset: 0;
    background: #080808;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.8s ease;
  }
  .loader.hidden { opacity: 0; pointer-events: none; }

  .loader-inner {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .loader-wordmark {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.2rem, 4vw, 2rem);
    letter-spacing: 0.25em;
    color: var(--yellow);
    opacity: 0.9;
  }

  .loader-ring {
    width: 32px; height: 32px;
    border: 2px solid rgba(255,205,51,0.15);
    border-top-color: var(--yellow);
    border-radius: 50%;
    animation: spin 0.85s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="slideshow" id="slideshow">

  <div class="loader" id="loader">
    <div class="loader-inner">
      <div class="loader-wordmark">THE CIRCLE.WORK</div>
      <div class="loader-ring"></div>
    </div>
  </div>

  <div class="slide active">
    <img src="https://thecircle.spaces.nexudus.com//images/UBZ.jpg?cache=2026-05-20T15:27:23+05:30" alt="The Circle.Work space">
  </div>
  <div class="slide">
    <img src="https://thecircle.spaces.nexudus.com//images/PSP.jpg?cache=2026-05-20T15:35:52+05:30" alt="The Circle.Work space">
  </div>
  <div class="slide">
    <img src="https://thecircle.spaces.nexudus.com//images/MCC.jpg?cache=2026-05-20T15:23:27+05:30" alt="The Circle.Work space">
  </div>
  <div class="slide">
    <img src="https://thecircle.spaces.nexudus.com//images/UBZ-15.jpg?cache=2026-06-06T15:27:00+05:30" alt="The Circle.Work space">
  </div>
  <div class="slide">
    <img src="https://thecircle.spaces.nexudus.com//images/_04A9349-HDR copy.jpg?cache=2026-06-06T15:28:53+05:30" alt="The Circle.Work space">
  </div>

  <div class="overlay">
    <div class="dots" id="dots"></div>
  </div>

</div>

<script>
  const TOTAL    = 5;
  const DURATION = 3000;
  let current    = 0;
  let timer      = null;
  let loaded     = 0;

  // Build dots
  const dotsEl = document.getElementById('dots');
  for (let i = 0; i < TOTAL; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.addEventListener('click', () => goTo(i));
    dotsEl.appendChild(d);
  }

  function slides() { return document.querySelectorAll('.slide'); }
  function dots()   { return document.querySelectorAll('.dot'); }

  function goTo(next) {
    if (next === current) return;
    clearTimeout(timer);

    const sl = slides(), dt = dots();
    sl[current].classList.remove('active');
    dt[current].classList.remove('active');

    current = ((next % TOTAL) + TOTAL) % TOTAL;

    sl[current].classList.add('active');
    const activeDot = dt[current];
    activeDot.classList.remove('active');
    void activeDot.offsetWidth; // force reflow to restart animation
    activeDot.classList.add('active');

    scheduleNext();
  }

  function scheduleNext() {
    clearTimeout(timer);
    timer = setTimeout(() => goTo(current + 1), DURATION);
  }

  // Hide loader when first image loads (or after 3s fallback)
  const firstImg = document.querySelector('.slide img');
  const loaderEl = document.getElementById('loader');

  function hideLoader() { loaderEl.classList.add('hidden'); }

  if (firstImg.complete) {
    hideLoader();
  } else {
    firstImg.addEventListener('load', hideLoader);
    firstImg.addEventListener('error', hideLoader);
  }
  setTimeout(hideLoader, 3000);

  // Preload remaining images
  document.querySelectorAll('.slide img').forEach(img => {
    const src = img.getAttribute('src');
    const preload = new Image();
    preload.src = src;
  });

  scheduleNext();
</script>
</body>
</html>
